<!-- Agent Brainstorm Chat Panel -->
<button class="chat-toggle" id="chat-toggle" onclick="toggleChat()" title="Brainstorm with Agent">
    <span id="chat-icon">{AI}</span>
</button>

<div class="chat-panel" id="chat-panel">
    <div class="chat-header">
        <span class="agent-indicator"></span>
        Agent Brainstorm
        <select id="chat-context-select" onchange="switchChatContext(this.value)">
            <option value="ideabot">IdeaBot</option>
            <option value="blueprint">Blueprint Agent</option>
            <option value="phase2">Orchestrator Agent</option>
        </select>
    </div>
    <div class="chat-messages" id="chat-messages">
        <div class="chat-msg agent">
            <div>
                <div class="chat-msg-label">Agent</div>
                <div class="chat-msg-bubble">Hi! I'm here to help brainstorm. Ask me about the idea, strategy, technical constraints, risks, or anything else. I'll respond in context.</div>
            </div>
        </div>
    </div>
    <div class="chat-typing" id="chat-typing">
        <span class="thinking-label">Thinking</span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chat-input" placeholder="Ask the agent..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">Send</button>
    </div>
</div>
